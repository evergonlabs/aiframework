name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  rust:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build
        working-directory: rust
        run: cargo build --release
      - name: Test
        working-directory: rust
        run: cargo test
      - name: Smoke test - index
        working-directory: rust
        run: ./target/release/aiframework index --target .. --summary
      - name: Smoke test - discover
        working-directory: rust
        run: |
          ./target/release/aiframework discover --target .. --output /tmp/ci-test
          test -f /tmp/ci-test/manifest.json
      - name: Smoke test - verify
        working-directory: rust
        run: ./target/release/aiframework verify --target ..

  installer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Installer syntax check
        run: bash -n install.sh
      - name: Installer help
        run: bash install.sh --help
      - name: Installer dry-run
        run: bash install.sh --dry-run
