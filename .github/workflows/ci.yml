name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Bash syntax check
        run: find . -name '*.sh' -not -path '*/.git/*' -not -path '*/vault/*' | xargs bash -n
      - name: ShellCheck
        if: matrix.os == 'ubuntu-latest'
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: './lib'
          additional_files: 'bin/aiframework bin/aiframework-mcp bin/aiframework-telemetry bin/aiframework-update-check'

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Python compile check
        run: find . -name '*.py' -not -path '*/__pycache__/*' | xargs python3 -m py_compile
      - name: Run indexer tests
        run: python3 tests/test_indexer.py
      - name: Smoke test indexer
        run: python3 -m lib.indexers.parse --target . --output /tmp/ci-index.json

  integration:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    needs: [lint, python]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install jq
        run: |
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            sudo apt-get install -y jq
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            brew install jq || true
          fi
        shell: bash
      - name: Full pipeline (discover + generate + verify)
        run: |
          ./bin/aiframework run --target . --non-interactive
      - name: Verify manifest exists
        run: test -f .aiframework/manifest.json
      - name: Verify code index exists
        run: test -f .aiframework/code-index.json
      - name: Verify CLAUDE.md was generated
        run: test -f CLAUDE.md
      - name: Check archetype detected
        run: jq -e '.archetype.type' .aiframework/manifest.json

  installer:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install jq (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y jq
      - name: Install jq (macOS)
        if: runner.os == 'macOS'
        run: brew install jq || true
      - name: Install jq (Windows)
        if: runner.os == 'Windows'
        run: choco install jq -y
      - name: Run installer tests
        run: bash tests/test_installer.sh
        shell: bash
      - name: Test dist tarball
        if: runner.os != 'Windows'
        run: |
          make dist
          VERSION=$(cat VERSION | tr -d '[:space:]')
          test -f "dist/aiframework-${VERSION}.tar.gz"
          tar tzf "dist/aiframework-${VERSION}.tar.gz" | grep -q "aiframework/bin/aiframework"
          rm -rf dist
        shell: bash

  json-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate data registries
        run: |
          python3 -c "
          import json, sys
          files = ['lib/data/languages.json', 'lib/data/domains.json', 'lib/data/deploy_targets.json', 'lib/data/archetypes.json']
          for f in files:
              try:
                  json.load(open(f))
                  print(f'OK: {f}')
              except Exception as e:
                  print(f'FAIL: {f}: {e}')
                  sys.exit(1)
          "
