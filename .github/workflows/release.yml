name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install jq
        run: |
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            sudo apt-get install -y jq
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            brew install jq || true
          fi
        shell: bash
      - name: Lint
        run: make lint
      - name: Test
        run: make test

  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate tag matches VERSION
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          FILE_VERSION="$(cat VERSION | tr -d '[:space:]')"
          if [[ "$TAG_VERSION" != "$FILE_VERSION" ]]; then
            echo "ERROR: Tag $TAG_VERSION does not match VERSION file $FILE_VERSION"
            exit 1
          fi
          echo "VERSION=$FILE_VERSION" >> "$GITHUB_ENV"

      - name: Build release tarball
        run: make dist

      - name: Compute checksums
        run: |
          cd dist/
          sha256sum *.tar.gz > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Extract changelog for this version
        id: changelog
        run: |
          # Extract the section for this version from CHANGELOG.md
          VERSION="${{ env.VERSION }}"
          # Get content between this version header and the next version header
          NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            # If no versioned section, use [Unreleased]
            NOTES=$(awk '/^## \[Unreleased\]/{found=1; next} /^## \[/{if(found) exit} found{print}' CHANGELOG.md)
          fi
          # Write to file for the release body
          echo "$NOTES" > /tmp/release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "aiframework v${{ env.VERSION }}"
          body_path: /tmp/release-notes.md
          files: |
            dist/aiframework-${{ env.VERSION }}.tar.gz
            dist/checksums-sha256.txt
          draft: false
          prerelease: false

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    if: ${{ vars.HOMEBREW_TAP_REPO != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version and compute SHA
        run: |
          VERSION="$(cat VERSION | tr -d '[:space:]')"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          TARBALL_URL="https://github.com/evergonlabs/aiframework/releases/download/v${VERSION}/aiframework-${VERSION}.tar.gz"
          # Download the release asset using gh (handles private repo auth)
          gh release download "v${VERSION}" --pattern "aiframework-*.tar.gz" --dir /tmp
          SHA256=$(sha256sum /tmp/aiframework-${VERSION}.tar.gz | awk '{print $1}')
          echo "SHA256=$SHA256" >> "$GITHUB_ENV"
          echo "TARBALL_URL=$TARBALL_URL" >> "$GITHUB_ENV"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew formula
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          repository: ${{ vars.HOMEBREW_TAP_REPO }}
          event-type: update-formula
          client-payload: |
            {
              "version": "${{ env.VERSION }}",
              "sha256": "${{ env.SHA256 }}",
              "url": "${{ env.TARBALL_URL }}"
            }
